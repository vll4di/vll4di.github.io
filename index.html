<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vll4di's website</title>
  <style>
    :root {
      --bg:           #282828;
      --bg-soft:      #32302f;
      --bg1:          #3c3836;
      --bg2:          #504945;
      --bg3:          #665c54;
      --bg4:          #7c6f64;
      --fg:           #ebdbb2;
      --fg2:          #d5c4a1;
      --fg4:          #a89984;
      --yellow:       #d79921;
      --bright-yellow:#fabd2f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: Georgia, 'Times New Roman', serif;
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 16px;
    }

    header h1 {
      font-size: 4rem;
      font-weight: bold;
      letter-spacing: -0.01em;
      color: var(--bright-yellow);
    }

    header p {
      font-size: 1.3rem;
      margin-top: 4px;
      color: var(--fg2);
    }

    /* ── Navigation ── */
    nav {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    nav a {
      display: inline-block;
      border: 1px solid var(--bg3);
      padding: 6px 12px;
      font-size: 0.85rem;
      color: var(--fg);
      text-decoration: none;
      text-align: center;
      min-width: 100px;
      background-color: var(--bg1);
    }

    nav a:hover {
      background-color: var(--yellow);
      color: var(--bg);
      border-color: var(--yellow);
    }

    nav a.active {
      background-color: var(--yellow);
      color: var(--bg);
      border-color: var(--yellow);
    }

    /* ── Main Content Box ── */
    main {
      border: 1px solid var(--bg3);
      background-color: var(--bg-soft);
      padding: 20px;
      margin-bottom: 20px;
    }

    /* ── Picture + Intro Row ── */
    .intro {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .picture-box {
      border: 1px solid var(--bg3);
      width: 160px;
      min-width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: var(--fg4);
      flex-shrink: 0;
      background-color: var(--bg1);
    }

    .intro-text {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--fg2);
    }

    /* ── Body Paragraphs ── */
    .body-text {
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 16px;
      color: var(--fg2);
    }

    .body-text:last-child {
      margin-bottom: 0;
    }

    /* ── Footer ── */
    footer {
      font-size: 0.85rem;
      color: var(--fg4);
      text-align: left;
    }
  </style>
</head>
<body>

  <header>
    <h1>Title</h1>
    <p>header</p>
  </header>

  <nav>
    <a href="index.html" class="active">Home</a>
    <a href="about.html">About</a>
    <a href="#">Link 3</a>
    <a href="#">Link 4</a>
    <a href="#">Link 5</a>
  </nav>

  <main>
    <div class="intro">
      <div class="picture-box">picture</div>
      <p class="intro-text">
        <!-- intro text goes here -->
      </p>
    </div>

    <p class="body-text">
      <!-- paragraph 1 goes here -->
    </p>

    <p class="body-text">
      <!-- paragraph 2 goes here -->
    </p>
  </main>

  <footer>
  vll4di.github.com | 2026 | vll4di | updated: 2026-03-31
  </footer>

</body>
</html>
